<div class="wrap" data-cg-scroll>
    <div ref="inner" class="inner" :class="[propBoolean('outside') && 'outside', propBoolean('collapse') && 'collapse', propBoolean('plain') && 'plain', propBoolean('stripe') && 'stripe', propBoolean('rowlr') && 'rowlr', 'size-' + props.size]" @scroll="scrollHandler">
        <table ref="table" data-table>
            <slot></slot>
        </table>
    </div>
    <cg-scroll v-if="length > client" :length="length" :client="client" v-model:offset="offset" @roll="roll"></cg-scroll>
</div>
